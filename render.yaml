services:
  - type: web
    name: web-novel-reader
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webui.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: AZURE_TTS_KEY
        sync: false
      - key: AZURE_TTS_REGION
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    plan: free
    healthCheckPath: /api/sites
